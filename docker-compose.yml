

services:
    laravel.test:
        build:
            context: ./docker/8.4
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: sail-8.4/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        depends_on:
            - mssql
        networks:
            - sail

    mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
            - '${DB_PORT:-1433}:1433'
        environment:
            ACCEPT_EULA: 'Y'
            MSSQL_SA_PASSWORD: '${DB_PASSWORD}'
        command: >
            bash -c "
            /opt/mssql/bin/sqlservr &
            until /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${DB_PASSWORD}' -C -Q 'SELECT 1' &>/dev/null; do
                sleep 2
            done;
            /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${DB_PASSWORD}' -C -Q \"IF DB_ID(N'laravel') IS NULL CREATE DATABASE [laravel]\"
            & wait"
        healthcheck:
            test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD}", "-C", "-Q", "SELECT 1"]
            interval: 10s
            timeout: 10s
            retries: 10
        volumes:
            - mssqldata:/var/opt/mssql
        networks:
            - sail

networks:
    sail:
        driver: bridge

volumes:
    mssqldata:
        driver: local
