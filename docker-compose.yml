version: '3.8'

services:
    laravel.test:
        build:
            context: ./docker/8.4
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: sail-8.4/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        depends_on:
            - mssql
        networks:
            - sail

    mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
            - '${DB_PORT:-1433}:1433'
        environment:
            ACCEPT_EULA: 'Y'
            SA_PASSWORD: '${DB_PASSWORD:-Secret123!}'
        healthcheck:
            test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD:-Secret123!}", "-Q", "SELECT 1"]
            interval: 10s
            timeout: 10s
            retries: 10
        networks:
            - sail

networks:
    sail:
        driver: bridge
